packages:
  "framer-motion": "For premium smooth entry animations, scroll reveals, and micro-interactions"
  "react-hook-form": "For complex multi-step form state management and validation"
  "@hookform/resolvers": "For Zod schema validation integration with react-hook-form"
  "date-fns": "For formatting dates in blog posts and client area"
  "clsx": "For conditional class name merging"
  "tailwind-merge": "For merging tailwind classes without conflicts"

images:
